name: linuxops-env
version: "2.1.0"
description: >
  A Linux operations remediation environment for training and evaluating
  AI agents on security-sensitive configuration tasks. Agents inspect
  broken system state, apply command-like remediation (chmod, chown,
  disable_service), and are graded on progress toward a secure, compliant
  final configuration.
author: sankara rao
license: MIT

tasks:
  - id: security_audit
    difficulty: easy
    description: Fix broken file permissions on authentication-related files.

  - id: provisioning_repair
    difficulty: medium
    description: Fix mixed permission and ownership issues from a broken deployment script.

  - id: log_audit
    difficulty: medium
    description: Fix logging infrastructure after a failed rsyslog migration.

  - id: incident_response
    difficulty: hard
    description: Recover a host after a bad config rollout with multiple security risks.

  - id: certificate_exposure
    difficulty: hard
    description: Secure exposed TLS private keys and configs after a botched certificate renewal.

actions:
  - chmod
  - chown
  - ls
  - stat
  - disable_service

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  grader: GET /grader
  tasks: GET /tasks
  baseline: POST /baseline

deployment:
  port: 7860
  dockerfile: Dockerfile

inference:
  script: inference.py
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
